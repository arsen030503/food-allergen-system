# Isolate tests from external PostgreSQL and Flyway (Hibernate builds schema)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

spring.jpa.open-in-view=false

# JWT for test context (same dev default as main, min 32 bytes)
app.jwt.secret=${APP_JWT_SECRET:allergen-system-dev-secret-key-32-bytes-min}

app.cors.allowed-origins=http://localhost:5173
