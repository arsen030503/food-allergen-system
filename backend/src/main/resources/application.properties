# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://164.92.177.64:5432/allergen-db
spring.datasource.username=arsen
spring.datasource.password=Arsen2004Loh
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Schema is owned by Flyway; Hibernate only validates mapping.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

spring.application.name=food-allergen-system

# JWT (set APP_JWT_SECRET in production — min 32 bytes)
app.jwt.secret=${APP_JWT_SECRET:allergen-system-dev-secret-key-32-bytes-min}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.jwt.cookie.secure=${APP_JWT_COOKIE_SECURE:false}
app.jwt.cookie.same-site=${APP_JWT_COOKIE_SAME_SITE:Lax}

# CORS: include local dev and the server public origin.
app.cors.allowed-origins=http://localhost,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://164.92.177.64,https://164.92.177.64
