# Server
server.port=${PORT:8080}

# PostgreSQL (override via DB_* or SPRING_DATASOURCE_*)
spring.datasource.url=jdbc:postgresql://${DB_HOST:164.92.177.64}:${DB_PORT:5432}/${DB_NAME:allergen-db}
spring.datasource.username=${DB_USER:arsen}
spring.datasource.password=${DB_PASSWORD:Arsen2004Loh}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Schema is owned by Flyway; Hibernate only validates mapping.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.application.name=food-allergen-system

# JWT (set APP_JWT_SECRET in production — min 32 bytes)
app.jwt.secret=${APP_JWT_SECRET:allergen-system-dev-secret-key-32-bytes-min}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.jwt.cookie.secure=${APP_JWT_COOKIE_SECURE:false}
app.jwt.cookie.same-site=${APP_JWT_COOKIE_SAME_SITE:Lax}

# CORS: comma-separated list; include your public site origin when front and API share a domain behind a proxy.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080}
