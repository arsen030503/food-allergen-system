# Server
server.port=${PORT:8080}

# PostgreSQL Database
# Используем переменные окружения для Upsun, локальные значения для разработки
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# App name
spring.application.name=food-allergen-system

# JWT
app.jwt.secret=allergen-system-dev-secret-key-32-bytes-min
app.jwt.expiration-ms=86400000
app.jwt.cookie.secure=false
app.jwt.cookie.same-site=Lax

