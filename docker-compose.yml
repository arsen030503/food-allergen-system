services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: allergen-backend
    restart: unless-stopped
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: allergen-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
